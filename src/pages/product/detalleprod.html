  <body>
    <div id="toast" class="toast"></div>
    <nav id="header"></nav>

    <!-- ═══ PRODUCT LAYOUT ════════════════════════════ -->
    <div class="dp-wrap">
      <div class="dp-card">

        <!-- Gallery -->
        <div class="dp-gallery">
          <div class="dp-main-wrap">
            <button class="dp-arrow dp-prev" aria-label="Anterior">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <img id="dp-main-img" src="" alt="" class="dp-main-img" />
            <button class="dp-arrow dp-next" aria-label="Siguiente">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
          <div class="dp-thumbs" id="dp-thumbs"></div>
        </div>

        <!-- Info -->
        <div class="dp-info">
          <a href="javascript:history.back()" class="dp-back">
            <i class="fa-solid fa-arrow-left"></i> Volver
          </a>

          <span class="dp-badge" id="dp-badge"></span>

          <h1 class="dp-nombre" id="dp-nombre">—</h1>

          <div class="dp-precio" id="dp-precio"></div>

          <p class="dp-stock" id="dp-stock"></p>

          <p class="dp-desc" id="dp-desc"></p>

          <div>
            <span class="dp-qty-label">Cantidad</span>
            <div class="dp-qty-row">
              <button class="dp-qty-btn" id="dp-minus">−</button>
              <input type="number" id="dp-qty" value="1" min="1" max="99" class="dp-qty-input" />
              <button class="dp-qty-btn" id="dp-plus">+</button>
            </div>
          </div>

          <button class="dp-btn-cart" id="dp-btn-cart">
            <i class="fa-solid fa-bag-shopping"></i>
            Agregar al carrito
          </button>

          <div class="dp-trust">
            <div class="dp-trust-item">
              <i class="fa-solid fa-truck-fast"></i>
              <span>Envío a Colombia</span>
            </div>
            <div class="dp-trust-item">
              <i class="fa-solid fa-shield-halved"></i>
              <span>Producto garantizado</span>
            </div>
            <div class="dp-trust-item">
              <i class="fa-solid fa-rotate-left"></i>
              <span>Devolución fácil</span>
            </div>
          </div>
        </div>

      </div><!-- /.dp-card -->

      <!-- Suggestions -->
      <div class="dp-suggestions">
        <h2 class="sugerencias-titulo">Algunas sugerencias para ti</h2>
        <div class="card-container" id="card-container"></div>
      </div>
    </div><!-- /.dp-wrap -->

    <footer>
      <div class="pieDePagina">
        <div class="izquierdo">
          <p class="footer-title">SÍGUENOS EN REDES</p>
          <div class="footer-icons">
            <a href="https://www.facebook.com/share/1K2zf4bYPw/" target="_blank">
              <img src="../../assets/icon/facebook.png" alt="Facebook">
            </a>

              <img src="../../assets/icon/tik-tok.png" alt="TikTok">
            </a>
            <a href="https://www.instagram.com/decayba19/?next=https%3A%2F%2Fwww.instagram.com%2Fp%2FB_eyX3hnQAb%2Fc%2F18142595998040329%2F%3F__coig_login%3D1" target="_blank">

            </a>
            <a href="https://api.whatsapp.com/send/?phone=573154380079&text&type=phone_number&app_absent=0" target="_blank">

          </div>
        </div>
        <div class="derecha">
          © <span id="year"></span> <strong>DECAYBA</strong> · Hecho con amor ❤
        </div>
      </div>
    </footer>

    <!-- Module: header + suggestions + cart module -->
    <script type="module">
      async function inicializarPagina() {
        try {
          const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';
          const headerResponse = await fetch(`${B}/src/components/headerglobal.html`, { cache: 'reload' });
          document.getElementById('header').innerHTML =
            (await headerResponse.text()).replaceAll('/Decayba/', `${B}/`);

          const { cargarMenuHamburguesa } = await import(`${B}/src/assets/js/modules/menu-loader.js`);
          await cargarMenuHamburguesa();

          const { renderSuggestions }    = await import(`${B}/src/assets/js/modules/renderCart.js`);
          const { actualizarCarritoVisual, agregarAlCarrito } = await import(`${B}/src/assets/js/modules/carrito.js`);
          const { verDetalleProducto }   = await import(`${B}/src/assets/js/modules/detalleProducto.js`);

          window.verDetalleProducto = verDetalleProducto;
          window.agregarAlCarrito   = agregarAlCarrito;

          const productoActual = JSON.parse(localStorage.getItem("productoSeleccionado")) || {};
          renderSuggestions(productoActual.nombre, productoActual.categoria);
          actualizarCarritoVisual();
        } catch (err) { console.error('❌', err); }
      }
      document.readyState === 'loading'
        ? document.addEventListener('DOMContentLoaded', inicializarPagina)
        : inicializarPagina();
    </script>

    <!-- Inline: gallery + product info -->
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';

      function resolveImg(path) {
        if (!path) return '';
        if (path.startsWith('/Decayba/')) return B + path.slice('/Decayba'.length);
        return path;
      }

      const item = JSON.parse(localStorage.getItem("productoSeleccionado")) || {};

      if (item.nombre) {
        document.title = `${item.nombre} - DECAYBA`;

        // Fill text fields
        document.getElementById('dp-nombre').textContent = item.nombre;
        document.getElementById('dp-precio').textContent = item.valor || '';
        document.getElementById('dp-desc').textContent   = item.descripcion || '';

        // Category badge
        const catEmoji = { mascotas:'🐾', personalizado:'🎁', belleza:'💅', juguetes:'🧸', viajes:'✈️' };
        const badgeEl = document.getElementById('dp-badge');
        if (item.categoria) badgeEl.textContent = `${catEmoji[item.categoria] || ''} ${item.categoria}`;

        // Stock
        const stockNum = typeof item.stock === 'number'
          ? item.stock
          : Object.values(item.stock || {}).reduce((a, b) => a + b, 0);
        const stockEl = document.getElementById('dp-stock');
        if (stockNum > 0) {
          stockEl.textContent = `✓ Disponible (${stockNum} en stock)`;
          stockEl.className = 'dp-stock in';
        } else {
          stockEl.textContent = '✗ Agotado';
          stockEl.className = 'dp-stock out';
        }

        // ── Gallery ──────────────────────────────────────
        const imagenes = item.imagenes || (item.imgs ? (Array.isArray(item.imgs) ? item.imgs : item.imgs.split(',')) : []);
        const mainImg  = document.getElementById('dp-main-img');
        const thumbsEl = document.getElementById('dp-thumbs');
        let currentIdx = 0;

        function setImage(idx) {
          currentIdx = idx;
          mainImg.style.opacity = '0.6';
          mainImg.src = resolveImg(imagenes[idx]);
          mainImg.alt = item.nombre;
          mainImg.onload = () => { mainImg.style.opacity = '1'; };
          thumbsEl.querySelectorAll('.dp-thumb').forEach((t, i) =>
            t.classList.toggle('active', i === idx)
          );
        }

        imagenes.forEach((src, i) => {
          const div = document.createElement('div');
          div.className = 'dp-thumb';
          div.innerHTML = `<img src="${resolveImg(src)}" alt="${item.nombre}">`;
          div.addEventListener('click', () => setImage(i));
          thumbsEl.appendChild(div);
        });

        if (imagenes.length > 0) setImage(0);

        // Hide arrows if only 1 image
        if (imagenes.length <= 1) {
          document.querySelector('.dp-prev').style.display = 'none';
          document.querySelector('.dp-next').style.display = 'none';
        }

        document.querySelector('.dp-prev')?.addEventListener('click', () =>
          setImage((currentIdx - 1 + imagenes.length) % imagenes.length)
        );
        document.querySelector('.dp-next')?.addEventListener('click', () =>
          setImage((currentIdx + 1) % imagenes.length)
        );

        // ── Quantity stepper ─────────────────────────────
        const qtyInput = document.getElementById('dp-qty');
        qtyInput.max = stockNum || 1;

        document.getElementById('dp-minus').addEventListener('click', () => {
          const v = parseInt(qtyInput.value);
          if (v > 1) qtyInput.value = v - 1;
        });
        document.getElementById('dp-plus').addEventListener('click', () => {
          const v = parseInt(qtyInput.value);
          if (v < stockNum) qtyInput.value = v + 1;
        });

        // ── Add to cart ──────────────────────────────────
        const btnCart = document.getElementById('dp-btn-cart');

        if (stockNum <= 0) {
          btnCart.disabled = true;
          btnCart.innerHTML = '<i class="fa-solid fa-ban"></i> Agotado';
        }

        btnCart.addEventListener('click', () => {
          if (typeof window.agregarAlCarrito !== 'function') return;
          const qty    = Math.max(1, parseInt(qtyInput.value) || 1);
          const precio = parseInt((item.valor || '').replace(/\D/g, ''));
          const img    = resolveImg(item.imagen || (imagenes[0] || ''));
          window.agregarAlCarrito(item.nombre, precio, img, qty);
        });
      }
    </script>
  </body>
</html>
