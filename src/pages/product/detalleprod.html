    <!-- Module script: header + suggestions -->
    <script type="module">
      async function inicializarPagina() {
        try {
          const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';

          const headerResponse = await fetch(`${B}/src/components/headerglobal.html`, { cache: 'reload' });
          const headerHtml = (await headerResponse.text()).replaceAll('/Decayba/', `${B}/`);
          document.getElementById('header').innerHTML = headerHtml;

          const { renderSuggestions } = await import(`${B}/src/assets/js/modules/renderCart.js`);
          const { actualizarCarritoVisual, agregarAlCarrito } = await import(`${B}/src/assets/js/modules/carrito.js`);
          const { verDetalleProducto } = await import(`${B}/src/assets/js/modules/detalleProducto.js`);

          window.verDetalleProducto = verDetalleProducto;
          window.agregarAlCarrito = agregarAlCarrito;

          const productoActual = JSON.parse(localStorage.getItem("productoSeleccionado")) || {};
          renderSuggestions(productoActual.nombre, productoActual.categoria);
          actualizarCarritoVisual();
        } catch (error) {
          console.error('❌ Error al inicializar:', error);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', inicializarPagina);
      } else {
        inicializarPagina();
      }
    </script>

    <!-- Inline script: product detail display & carousel -->
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';

      function resolveImg(path) {
        if (!path) return '';
        if (path.startsWith('/Decayba/')) return B + path.slice('/Decayba'.length);
        return path;
      }

      const carouselImages = document.querySelector(".carousel-images");
      const prevBtn = document.querySelector(".prev");
      const nextBtn = document.querySelector(".next");
      const item = JSON.parse(localStorage.getItem("productoSeleccionado")) || {};
      const productDetail = document.getElementById("product-detaill");
      const carrousel = document.getElementById("carousel");

      // Build carousel images
      if (item.imagenes && carrousel) {
        item.imagenes.forEach((src) => {
          const div = document.createElement("div");
          div.classList.add("carousel-item");
          div.innerHTML = `<img src="${resolveImg(src)}" alt="${item.nombre || ''}">`;
          carrousel.appendChild(div);
        });
      }

      // Build product info panel
      if (item.nombre && productDetail) {
        const panel = document.createElement("aside");
        panel.classList.add("product-inf");
        panel.innerHTML = `
          <h2>${item.nombre}</h2>
          <p>${item.descripcion || ''}</p>
          <p>${item.valor || ''}</p>
          <figure>
            <a href="#" class="agregar-al-carrito primary-button add-to-cart-button"
              data-nombre="${item.nombre}"
              data-precio="${(item.valor || '').replace(/\D/g, '')}"
              data-img="${resolveImg(item.imagen || '')}">
              <img src="${B}/src/assets/icon/bt_add_to_cart.svg" alt="add to cart">
              Agregar al carrito
            </a>
          </figure>
        `;
        productDetail.appendChild(panel);

        panel.querySelector(".agregar-al-carrito").addEventListener("click", (e) => {
          e.preventDefault();
          if (typeof window.agregarAlCarrito === "function") {
            const nombre = item.nombre;
            const precio = parseInt((item.valor || "").replace(/\D/g, ""));
            const img = resolveImg(item.imagen || "");
            window.agregarAlCarrito(nombre, precio, img, 1);
          }
        });
      }

      // Carousel controls
      const images = document.querySelectorAll(".carousel-images img");
      let counter = 0;
      const total = images.length;

      function updateCarousel() {
        const size = images[0] ? images[0].clientWidth : 0;
        carouselImages.style.transform = `translateX(${-size * counter}px)`;
      }

      if (nextBtn) nextBtn.addEventListener("click", () => { counter = (counter + 1) % total; updateCarousel(); });
      if (prevBtn) prevBtn.addEventListener("click", () => { counter = (counter - 1 + total) % total; updateCarousel(); });
      window.addEventListener("resize", updateCarousel);

      // Mobile: auto-scroll reset
      document.addEventListener("DOMContentLoaded", () => {
        const carousel = document.querySelector(".carousel-images");
        if (!carousel) return;
        let isAtEnd = false;
        carousel.addEventListener("scroll", () => {
          const maxScrollLeft = carousel.scrollWidth - carousel.clientWidth;
          if (carousel.scrollLeft >= maxScrollLeft - 10 && window.innerWidth <= 640 && !isAtEnd) {
            isAtEnd = true;
            setTimeout(() => { carousel.scrollTo({ left: 0, behavior: "smooth" }); isAtEnd = false; }, 1200);
          }
        });
      });
    </script>
  </body>
