  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

  <script type="module">
    async function inicializarPagina() {
      try {
        const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';

        const headerResponse = await fetch(`${B}/src/components/headerglobal.html`, { cache: 'reload' });
        const headerHtml = (await headerResponse.text()).replaceAll('/Decayba/', `${B}/`);
        document.getElementById('header').innerHTML = headerHtml;

        const { cargarMenuHamburguesa } = await import(`${B}/src/assets/js/modules/menu-loader.js`);
        await cargarMenuHamburguesa();

        const { renderCart } = await import(`${B}/src/assets/js/modules/renderCart.js`);
        const { actualizarCarritoVisual } = await import(`${B}/src/assets/js/modules/carrito.js`);
        const { verDetalleProducto } = await import(`${B}/src/assets/js/modules/detalleProducto.js`);

        window.verDetalleProducto = verDetalleProducto;
        renderCart();
        actualizarCarritoVisual();
      } catch (error) {
        console.error('❌ Error al inicializar:', error);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', inicializarPagina);
    } else {
      inicializarPagina();
    }
  </script>
