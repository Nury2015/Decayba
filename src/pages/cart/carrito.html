<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DECAYBA — Carrito</title>
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/carrito.css" />
    <link rel="stylesheet" href="../../assets/css/mobile.css" />
    <link rel="stylesheet" href="../../assets/css/header.css" />
    <link rel="stylesheet" href="../../assets/css/footer.css" />
    <link rel="stylesheet" href="../../assets/css/home.css" />
    <link rel="stylesheet" href="../../assets/css/cart.css" />
    <link rel="stylesheet" href="../../assets/css/tituloSugerencias.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>

  <body class="carrito-bg">
    <div id="contenedor-hamburguesa"></div>
    <div id="contenedor-menu"></div>
    <div id="toast" class="toast"></div>
    <nav id="header"></nav>

    <!-- ═══ HERO BANNER ═══════════════════════════════ -->
    <div class="carrito-hero">
      <span class="carrito-hero-icon">🛍️</span>
      <h1>Tu carrito</h1>
      <p>Revisa tus productos y completa tu pedido</p>
    </div>

    <!-- ═══ CONTENIDO PRINCIPAL ═══════════════════════ -->
    <div class="contenedor-carrito">

      <!-- Lista de productos -->
      <div class="my-order" id="my-order">
        <p class="cart-section-title">
          <i class="fa-solid fa-bag-shopping" style="color:#4caf77"></i>
          Productos seleccionados
        </p>
        <div class="cabecera">
          <h1 class="title">
            <input type="checkbox" id="select-all" style="width:18px;height:18px;accent-color:#4caf77;cursor:pointer;" />
            Seleccionar todos
          </h1>
        </div>
        <div id="list-shopping"></div>
      </div>

      <!-- Resumen del pedido -->
      <div class="order" id="resumen" style="display:none;"></div>

    </div>

    <!-- Estado vacío (se llena dinámicamente) -->
    <div id="sugerencia"></div>

    <!-- Sugerencias -->
    <h2 class="sugerencias-titulo">Algunas sugerencias para ti</h2>
    <div class="card-container" id="card-container"></div>

    <footer>
      <div class="pieDePagina">
        <div class="izquierdo">
          <p class="footer-title">SÍGUENOS EN REDES</p>
          <div class="footer-icons">
            <a href="https://www.facebook.com/share/1K2zf4bYPw/" target="_blank">
              <img src="../../assets/icon/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.tiktok.com/@decayba?_d=secCgYIASAHKAESPgo8EytQ1sHK8ySVLp5ckObNcf%2BPwORASCaky%2Blc9%2Fr2jw5T%2FomWY3alMybYLlTm8pjhjwv0AW8uIo84gjkgGgA%3D&_r=1&_svg=1&checksum=8b4ea6491a486d67ab9a1237e8af8b02e1de5c9d6f2bcce14b251e633f041e35&lang=es&sec_uid=MS4wLjABAAAAIUr2Eb9su1Yc_Wk_35hJqp4xxc1ry8VEDYzLT2LcJhNowNmw8Tg6Squqkp0iU7XK&sec_user_id=MS4wLjABAAAAbF3-kfFpa7nEEt-w3HJ9bMKLBsloUIaM9UB3TOKz4lh1pIkUc7LujIunHt6MRl4C&share_app_id=1340&share_author_id=6676508546471412741&share_link_id=643b91d7-52ff-459c-81af-20c33b250ef3&share_region=CO&share_scene=1&sharer_language=es&source=h5_m&timestamp=1762466620&u_code=ei8jjd136fmj1d&ugbiz_name=Account&user_id=7459417132498682885&utm_campaign=client_share&utm_source=copy" target="_blank">
              <img src="../../assets/icon/tik-tok.png" alt="TikTok">
            </a>
            <a href="https://www.instagram.com/decayba19/?next=https%3A%2F%2Fwww.instagram.com%2Fp%2FB_eyX3hnQAb%2Fc%2F18142595998040329%2F%3F__coig_login%3D1" target="_blank">
              <img src="../../assets/icon/instagram.png" alt="Instagram">
            </a>
            <a href="https://api.whatsapp.com/send/?phone=573154380079&text&type=phone_number&app_absent=0" target="_blank">
              <img src="../../assets/icon/whatsapp.png" alt="WhatsApp">
            </a>
          </div>
        </div>
        <div class="derecha">
          © <span id="year"></span> <strong>DECAYBA</strong> · Hecho con amor ❤
        </div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      document.addEventListener("DOMContentLoaded", () => {
        let cart = JSON.parse(localStorage.getItem("carrito")) || [];
        let listaSeleccionados = [];
        let selectAllFlag = true;

        const sugerencia  = document.getElementById("sugerencia");
        const myOrder     = document.getElementById("my-order");
        const listShopping= document.getElementById("list-shopping");
        const resumen     = document.getElementById("resumen");
        const FREE_SHIP   = 100000;

        // ── UI helpers ────────────────────────────────
        function actualizarCarritoVisual() {
          const div = document.querySelector(".navbar-shopping-cart div");
          const total = (JSON.parse(localStorage.getItem("carrito")) || [])
            .reduce((acc, i) => acc + i.cantidad, 0);
          if (div) div.textContent = total;
        }

        function showEmptyCart() {
          myOrder.style.display = "none";
          resumen.style.display = "none";
          sugerencia.innerHTML = `
            <div class="carrito-vacio">
              <span class="carrito-vacio-icon">🛒</span>
              <h3>Tu carrito está vacío</h3>
              <p>¡Agrega productos y empieza a comprar!</p>
              <a href="../../index.html" class="btn-seguir-comprando">
                <i class="fa-solid fa-arrow-left"></i> Ver productos
              </a>
            </div>`;
        }

        function showFullCart() {
          myOrder.style.display = "block";
          resumen.style.display = "block";
          sugerencia.innerHTML = "";
        }

        // ── Resumen con barra de envío ─────────────────
        function renderResumenSeleccionados() {
          const subtotal = listaSeleccionados.reduce(
            (acc, item) => acc + item.precio * item.cantidad, 0
          );
          const envio  = subtotal > 0 ? (subtotal >= FREE_SHIP ? 0 : 15000) : 0;
          const total  = subtotal + envio;
          const faltan = Math.max(FREE_SHIP - subtotal, 0);
          const pct    = Math.min((subtotal / FREE_SHIP) * 100, 100);

          const envioLinea = subtotal >= FREE_SHIP
            ? `<p><span>Envío</span><span style="color:#4caf77;font-weight:700;">¡Gratis! 🎉</span></p>`
            : `<p><span>Envío</span><span>$${envio.toLocaleString()}</span></p>`;

          const progressSection = subtotal > 0 ? `
            <div class="shipping-progress-wrap">
              <div class="shipping-progress">
                <div class="shipping-progress-fill" style="width:${pct}%"></div>
              </div>
              <p class="shipping-label ${subtotal >= FREE_SHIP ? 'free' : ''}">
                ${subtotal >= FREE_SHIP
                  ? '🎉 ¡Envío gratis desbloqueado!'
                  : `Te faltan <strong>$${faltan.toLocaleString()}</strong> para envío gratis`}
              </p>
            </div>` : '';

          resumen.innerHTML = `
            <h2 class="resumen-titulo">Resumen del pedido</h2>
            <div class="resumen-box">
              <p><span>Subtotal (${listaSeleccionados.length} art.)</span><span>$${subtotal.toLocaleString()}</span></p>
              ${envioLinea}
              <p class="total-line"><span>Total</span><span>$${total.toLocaleString()}</span></p>
            </div>
            ${progressSection}
            ${subtotal > 0 ? `
              <div class="verificar">
                <a href="https://wa.me/573154380079?text=Hola%2C%20quiero%20realizar%20mi%20pedido%20por%20un%20total%20de%20%24${total.toLocaleString()}"
                   target="_blank"
                   class="btn-whatsapp"
                   id="btn-whatsapp">
                  <i class="fa-brands fa-whatsapp" style="font-size:20px;"></i>
                  Pedir por WhatsApp
                </a>
              </div>` : ''}
          `;
        }

        // ── Reconcile & sync ───────────────────────────
        function reconcileSeleccionadosConCarrito() {
          const c = JSON.parse(localStorage.getItem("carrito")) || [];
          const nombres = new Set(c.map(i => i.nombre));
          listaSeleccionados = listaSeleccionados.filter(p => nombres.has(p.nombre));
          if (selectAllFlag) listaSeleccionados = [...c];
        }

        function syncCheckmarks() {
          const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
          document.querySelectorAll('input[name="item"]').forEach(cb => {
            const item = carrito[parseInt(cb.dataset.index)];
            cb.checked = !!item && listaSeleccionados.some(p => p.nombre === item.nombre);
          });
          const sa = document.getElementById("select-all");
          if (sa) {
            const total = document.querySelectorAll('input[name="item"]').length;
            const sel   = listaSeleccionados.length;
            sa.checked       = total > 0 && sel === total;
            sa.indeterminate = sel > 0 && sel < total;
          }
        }

        // ── Render a single cart item ──────────────────
        function renderCartItem(item, index) {
          const subtotal = item.precio * item.cantidad;
          const el = document.createElement("div");
          el.classList.add("shopping-cart");
          el.innerHTML = `
            <label class="label-product">
              <input type="checkbox" name="item" value="${item.nombre}" data-index="${index}">
              <figure>
                <img src="${item.img}" alt="${item.nombre}">
              </figure>
              <div class="inf-product">
                <p><strong>${item.nombre}</strong></p>
                <p class="precio-item">$${subtotal.toLocaleString()}</p>
                <small>$${item.precio.toLocaleString()} c/u &times; ${item.cantidad}</small>
              </div>
              <img src="../../../src/assets/icon/icon_close.png"
                   alt="Eliminar" data-index="${index}" class="btn-remove">
            </label>`;
          listShopping.appendChild(el);
        }

        // ── Render full list ───────────────────────────
        function renderItems() {
          const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
          listShopping.innerHTML = "";
          sugerencia.innerHTML  = "";

          if (carrito.length === 0) {
            showEmptyCart();
            listaSeleccionados = [];
            selectAllFlag = false;
            return;
          }

          showFullCart();
          carrito.forEach((item, i) => renderCartItem(item, i));
          reconcileSeleccionadosConCarrito();
          syncCheckmarks();
          renderResumenSeleccionados();
        }

        // ── Checkbox events ────────────────────────────
        document.addEventListener("change", (e) => {
          if (e.target?.name === "item") {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const item = carrito[parseInt(e.target.dataset.index)];
            if (!item) return;
            if (e.target.checked) {
              if (!listaSeleccionados.some(p => p.nombre === item.nombre))
                listaSeleccionados.push({ ...item });
            } else {
              listaSeleccionados = listaSeleccionados.filter(p => p.nombre !== item.nombre);
            }
            const total = document.querySelectorAll('input[name="item"]').length;
            selectAllFlag = listaSeleccionados.length === total && total > 0;
            renderResumenSeleccionados();
            syncCheckmarks();
          }
        });

        document.addEventListener("change", (e) => {
          if (e.target?.id === "select-all") {
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            selectAllFlag = e.target.checked;
            listaSeleccionados = selectAllFlag ? [...carrito] : [];
            document.querySelectorAll('input[name="item"]').forEach(cb => cb.checked = selectAllFlag);
            renderResumenSeleccionados();
            syncCheckmarks();
          }
        });

        // ── Agregar desde sugerencias ──────────────────
        document.addEventListener("click", (e) => {
          if (!e.target.closest(".agregar-al-carrito")) return;
          e.preventDefault();
          setTimeout(() => { renderItems(); actualizarCarritoVisual(); }, 100);
        });

        // ── Eliminar con la X ──────────────────────────
        document.addEventListener("click", (e) => {
          if (!e.target.closest(".btn-remove")) return;
          e.preventDefault();
          setTimeout(() => { renderItems(); actualizarCarritoVisual(); }, 100);
        });

        // ── WhatsApp ───────────────────────────────────
        document.addEventListener("click", (e) => {
          const btn = e.target.closest("#btn-whatsapp");
          if (!btn) return;
          e.preventDefault();
          const cart = JSON.parse(localStorage.getItem("carrito")) || [];
          if (cart.length === 0) { alert("Tu carrito está vacío."); return; }

          const fecha = new Date().toLocaleDateString("es-CO", { day:"2-digit", month:"long", year:"numeric" });
          let msg = `📅 *Fecha:* ${fecha}\n\n🛍️ *Resumen de tu pedido* 💕\n\n`;
          cart.forEach(item => {
            const sub = item.precio * item.cantidad;
            msg += `*${item.nombre}*\nCantidad: ${item.cantidad}\nPrecio: $${item.precio.toLocaleString("es-CO")}\nSubtotal: $${sub.toLocaleString("es-CO")}\n\n`;
          });
          const total = cart.reduce((a, i) => a + i.precio * i.cantidad, 0);
          msg += `💰 *Total:* $${total.toLocaleString("es-CO")}\n\n✅ Gracias por tu compra 💖✨`;
          window.open(`https://api.whatsapp.com/send?phone=573154380079&text=${encodeURI(msg.trim())}`, "_blank");
        });

        // ── Init ───────────────────────────────────────
        renderItems();
        actualizarCarritoVisual();

        // Deshabilitar el ícono de carrito estando en carrito.html
        const carritoBtn = document.getElementById("ver-carrito");
        if (carritoBtn && window.location.pathname.includes("carrito.html")) {
          carritoBtn.removeAttribute("href");
          carritoBtn.style.pointerEvents = "none";
          carritoBtn.style.opacity = "0.5";
          carritoBtn.style.cursor  = "not-allowed";
        }
      });
    </script>

    <script type="module">
      async function inicializarPagina() {
        try {
          const B = window.location.pathname.startsWith('/Decayba') ? '/Decayba' : '';
          const headerResponse = await fetch(`${B}/src/components/headerglobal.html`, { cache: 'reload' });
          document.getElementById('header').innerHTML =
            (await headerResponse.text()).replaceAll('/Decayba/', `${B}/`);
          const { cargarMenuHamburguesa } = await import(`${B}/src/assets/js/modules/menu-loader.js`);
          await cargarMenuHamburguesa();
          const { renderCart } = await import(`${B}/src/assets/js/modules/renderCart.js`);
          const { actualizarCarritoVisual } = await import(`${B}/src/assets/js/modules/carrito.js`);
          const { verDetalleProducto } = await import(`${B}/src/assets/js/modules/detalleProducto.js`);
          window.verDetalleProducto = verDetalleProducto;
          renderCart();
          actualizarCarritoVisual();
        } catch (err) { console.error('❌', err); }
      }
      document.readyState === 'loading'
        ? document.addEventListener('DOMContentLoaded', inicializarPagina)
        : inicializarPagina();
    </script>
  </body>
</html>
